                    this.classList.add('is-loaded');

        }</script><style>/* Прыгающие точки анимации "Печатает..." */

    /* Эффект при наведении на кнопку */
    #logai-btn:hover { transform: scale(1.1); box-shadow: 0 12px 30px rgba(0,123,255,0.5); }</style><div id="logai-widget"><div id="logai-btn" onclick="toggleLogAI()" style="position:fixed; bottom:20px; right:20px; width:65px; height:65px; background: linear-gradient(135deg, #007bff 0%, #0056b3 100%); border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 10px 25px rgba(0,123,255,0.4); z-index:10000; transition: all 0.3s ease;"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></div><div id="logai-window" style="display:none; position:fixed; bottom:95px; right:20px; width:370px; height:580px; background:#1e1e1e; border-radius:24px; box-shadow:0 20px 50px rgba(0,0,0,0.4); flex-direction:column; z-index:10000; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow:hidden; border: 1px solid rgba(255,255,255,0.1);"><div style="background: #252525; padding:20px; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:center;"><div style="display:flex; align-items:center; gap:10px;"><div style="width:10px; height:10px; background:#28a745; border-radius:50%; box-shadow:0 0 8px #28a745;"></div><span style="font-weight:600; color:white; font-size:16px;">AI Архитектор</span></div><span onclick="toggleLogAI()" style="cursor:pointer; color:#888; font-size:22px; line-height:1;">&times;</span></div><div id="logai-msgs" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px; background:#1e1e1e;"></div><div style="padding:20px; background:#252525; display:flex; gap:10px; align-items:center; border-top: 1px solid rgba(255,255,255,0.05);"><input type="text" id="logai-input" style="flex:1; padding:12px 18px; border-radius:25px; background:#333; border:1px solid rgba(255,255,255,0.1); outline:none; color:white; font-size:15px;" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendLogAI()"> <button onclick="sendLogAI()" style="background:#007bff; border:none; width:42px; height:42px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:0.2s;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button></div></div></div><script>const API_URL = 'https://api.log-ai.ru'; 

    function toggleLogAI() {
        const w = document.getElementById('logai-window');
        w.style.display = w.style.display === 'none' ? 'flex' : 'none';
    }

    let logSid = localStorage.getItem('logai_sid') || 's_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('logai_sid', logSid);

    function addLogMsg(txt, isAi) {
        const d = document.createElement('div');
        d.style = `padding:12px 16px; border-radius:18px; max-width:75%; font-size:15px; line-height:1.6; transition: background 0.3s ease, color 0.3s ease; ${isAi ? 'align-self:flex-start; background:#444; color:white;' : 'align-self:flex-end; background:#007bff; color:white;'}`;
        d.innerText = txt;
        const box = document.getElementById('logai-msgs');
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
        return d;
    }

    async function sendLogAI() {
        const el = document.getElementById('logai-input');
        const msg = el.value.trim();
        if (!msg) return;
        el.value = '';
        addLogMsg(msg, false);

        try {
            const res = await fetch(`${API_URL}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sessionId: logSid,
                    message: msg,
                    clientId: 'client_arhitektor' // Твой ID для этого сайта
                })
            });

            const data = await res.json();
            
            if (data.messageId) {
                const aiMsg = addLogMsg('Печатает...', true);
                let startTime = Date.now();
                let interval = 3000;
                let errorCount = 0;
                const busyText = 'Я всё еще обрабатываю ваш запрос...';

                const poll = async () => {
                    const elapsed = (Date.now() - startTime) / 1000;

                    if (elapsed > 900) {
                        aiMsg.innerText = 'Извините, я призадумался слишком сильно. Попробуйте заглянуть позже.';
                        return; 
                    }

                    try {
                        const r = await fetch(`${API_URL}/get-answer/${data.messageId}`);
                        const d = await r.json();

                        if (d.answer) {
                            aiMsg.innerText = d.answer;
                            return; 
                        }

                        // Умное изменение текста
                        if (elapsed > 60 && elapsed < 180 && aiMsg.innerText === 'Печатает...') {
                            aiMsg.innerText = 'Вопрос сложный, думаю...';
                        }
                        if (elapsed > 180 && aiMsg.innerText !== busyText) {
                            aiMsg.innerText = busyText;
                            interval = 30000; // Замедляем до 30 сек
                        }

                        errorCount = 0;
                        setTimeout(poll, interval);

                    } catch (e) {
                        errorCount++;
                        if (errorCount >= 3) {
                            aiMsg.innerText = 'Проблемы на сервере. Попробуйте позже.';
                            return;
                        }
                        setTimeout(poll, interval);
                    }
                };

                poll();
            }
        } catch (e) {
            addLogMsg('Ошибка связи. Попробуйте позже.', true);
        }
    }</script></body></html>
