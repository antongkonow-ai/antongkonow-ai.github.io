        }</script><style>/* Выносим всё оформление сюда, чтобы Publii не резал атрибуты style */

    .logai-dots span { display: inline-block; width: 5px; height: 5px; background: #aaa !important; border-radius: 50%; margin-right: 3px; animation: logai-bounce 1.4s infinite ease-in-out; }</style><div id="logai-widget"><div id="logai-btn" onclick="toggleLogAI()"><span style="color: white; font-size: 30px;">💬</span></div><div id="logai-window"><div class="logai-header"><div style="display:flex; align-items:center; gap:10px;"><div style="width:10px; height:10px; background:#28a745; border-radius:50%; box-shadow:0 0 10px #28a745;"></div><span style="color: white; font-weight: bold;">AI Архитектор</span></div><span onclick="toggleLogAI()" style="cursor:pointer; color:white; font-size:30px;">&times;</span></div><div id="logai-msgs"></div><div class="logai-input-area"><input type="text" id="logai-input" placeholder="Напишите..." onkeypress="if(event.key==='Enter') sendLogAI()"> <button id="logai-send-btn" onclick="sendLogAI()">➤</button></div></div></div><script>const API_URL = 'https://api.log-ai.ru'; 

    function toggleLogAI() {
        const w = document.getElementById('logai-window');
        w.style.display = w.style.display === 'none' ? 'flex' : 'none';
    }

    let logSid = localStorage.getItem('logai_sid') || 's_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('logai_sid', logSid);

    function addLogMsg(txt, isAi) {
        const d = document.createElement('div');
        d.style = `padding:12px 16px; border-radius:18px; max-width:75%; font-size:15px; line-height:1.6; transition: background 0.3s ease, color 0.3s ease; ${isAi ? 'align-self:flex-start; background:#444; color:white;' : 'align-self:flex-end; background:#007bff; color:white;'}`;
        d.innerText = txt;
        const box = document.getElementById('logai-msgs');
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
        return d;
    }

    async function sendLogAI() {
        const el = document.getElementById('logai-input');
        const msg = el.value.trim();
        if (!msg) return;
        el.value = '';
        addLogMsg(msg, false);

        try {
            const res = await fetch(`${API_URL}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sessionId: logSid,
                    message: msg,
                    clientId: 'client_arhitektor' // Твой ID для этого сайта
                })
            });

            const data = await res.json();
            
            if (data.messageId) {
                const aiMsg = addLogMsg('Печатает...', true);
                let startTime = Date.now();
                let interval = 3000;
                let errorCount = 0;
                const busyText = 'Я всё еще обрабатываю ваш запрос...';

                const poll = async () => {
                    const elapsed = (Date.now() - startTime) / 1000;

                    if (elapsed > 900) {
                        aiMsg.innerText = 'Извините, я призадумался слишком сильно. Попробуйте заглянуть позже.';
                        return; 
                    }

                    try {
                        const r = await fetch(`${API_URL}/get-answer/${data.messageId}`);
                        const d = await r.json();

                        if (d.answer) {
                            aiMsg.innerText = d.answer;
                            return; 
                        }

                        // Умное изменение текста
                        if (elapsed > 60 && elapsed < 180 && aiMsg.innerText === 'Печатает...') {
                            aiMsg.innerText = 'Вопрос сложный, думаю...';
                        }
                        if (elapsed > 180 && aiMsg.innerText !== busyText) {
                            aiMsg.innerText = busyText;
                            interval = 30000; // Замедляем до 30 сек
                        }

                        errorCount = 0;
                        setTimeout(poll, interval);

                    } catch (e) {
                        errorCount++;
                        if (errorCount >= 3) {
                            aiMsg.innerText = 'Проблемы на сервере. Попробуйте позже.';
                            return;
                        }
                        setTimeout(poll, interval);
                    }
                };

                poll();
            }
        } catch (e) {
            addLogMsg('Ошибка связи. Попробуйте позже.', true);
        }
    }</script></body></html>
