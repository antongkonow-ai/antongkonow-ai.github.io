click="toggleLogAI()" style="cursor:pointer !important; color:#ffffff !important; font-size:35px !important; line-height: 0.7 !important; padding:10px !important;">&times;</span></div><div id="logai-msgs" style="flex:1 !important; overflow-y:auto !important; padding:20px !important; display:flex !important; flex-direction:column !important; gap:16px !important; background:#3b3e45 !important;"></div><div style="padding:20px !important; background:#2d3035 !important; display:flex !important; gap:10px !important; align-items:center !important;"><input type="text" id="logai-input" style="flex:1 !important; padding:13px 20px !important; border-radius:25px !important; background:#4a4e56 !important; border:1px solid rgba(255,255,255,0.1) !important; color:#ffffff !important; outline:none !important;" placeholder="Напишите..."> <button onclick="sendLogAI()" style="background:#007bff !important; border:none !important; width:45px !important; height:45px !important; border-radius:50% !important; cursor:pointer !important; display:flex !important; align-items:center !important; justify-content:center !important;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button></div></div></div><script>const API_URL = 'https://api.log-ai.ru'; 

    function toggleLogAI() {
        const w = document.getElementById('logai-window');
        w.style.display = w.style.display === 'none' ? 'flex' : 'none';
    }

    let logSid = localStorage.getItem('logai_sid') || 's_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('logai_sid', logSid);

    function addLogMsg(txt, isAi) {
        const d = document.createElement('div');
        d.style = `padding:12px 16px; border-radius:18px; max-width:75%; font-size:15px; line-height:1.6; transition: background 0.3s ease, color 0.3s ease; ${isAi ? 'align-self:flex-start; background:#444; color:white;' : 'align-self:flex-end; background:#007bff; color:white;'}`;
        d.innerText = txt;
        const box = document.getElementById('logai-msgs');
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
        return d;
    }

    async function sendLogAI() {
        const el = document.getElementById('logai-input');
        const msg = el.value.trim();
        if (!msg) return;
        el.value = '';
        addLogMsg(msg, false);

        try {
            const res = await fetch(`${API_URL}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sessionId: logSid,
                    message: msg,
                    clientId: 'client_arhitektor' // Твой ID для этого сайта
                })
            });

            const data = await res.json();
            
            if (data.messageId) {
                const aiMsg = addLogMsg('Печатает...', true);
                let startTime = Date.now();
                let interval = 3000;
                let errorCount = 0;
                const busyText = 'Я всё еще обрабатываю ваш запрос...';

                const poll = async () => {
                    const elapsed = (Date.now() - startTime) / 1000;

                    if (elapsed > 900) {
                        aiMsg.innerText = 'Извините, я призадумался слишком сильно. Попробуйте заглянуть позже.';
                        return; 
                    }

                    try {
                        const r = await fetch(`${API_URL}/get-answer/${data.messageId}`);
                        const d = await r.json();

                        if (d.answer) {
                            aiMsg.innerText = d.answer;
                            return; 
                        }

                        // Умное изменение текста
                        if (elapsed > 60 && elapsed < 180 && aiMsg.innerText === 'Печатает...') {
                            aiMsg.innerText = 'Вопрос сложный, думаю...';
                        }
                        if (elapsed > 180 && aiMsg.innerText !== busyText) {
                            aiMsg.innerText = busyText;
                            interval = 30000; // Замедляем до 30 сек
                        }

                        errorCount = 0;
                        setTimeout(poll, interval);

                    } catch (e) {
                        errorCount++;
                        if (errorCount >= 3) {
                            aiMsg.innerText = 'Проблемы на сервере. Попробуйте позже.';
                            return;
                        }
                        setTimeout(poll, interval);
                    }
                };

                poll();
            }
        } catch (e) {
            addLogMsg('Ошибка связи. Попробуйте позже.', true);
        }
    }</script></body></html>
